<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .gender-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .gender-option {
            flex: 1;
            position: relative;
        }

        .gender-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .gender-option label {
            display: block;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .gender-option input[type="radio"]:checked+label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .password-help {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s;
        }

        .whatsapp-btn:hover {
            background: #20BA5A;
            transform: translateY(-2px);
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .profile-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 0;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .category-btn {
            padding: 20px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            color: #333;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .pdf-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .pdf-item {
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .pdf-item:hover {
            background: #667eea;
            color: white;
            transform: translateX(5px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .pdf-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
        }

        .pdf-viewer.active {
            display: flex;
            flex-direction: column;
        }

        .pdf-controls {
            background: #333;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pdf-controls button {
            width: auto;
            padding: 10px 20px;
            margin: 0 5px;
        }

        .close-btn {
            background: #c33;
        }

        .pdf-frame {
            flex: 1;
            border: none;
            background: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Page 1: Registration -->
        <div id="page1" class="page active">
            <h1>📚 Student Registration</h1>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="name">आपका नाम</label>
                    <input type="text" id="name" required placeholder="अपना पूरा नाम लिखें">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="gender-group">
                        <div class="gender-option">
                            <input type="radio" id="boy" name="gender" value="Boy" required>
                            <label for="boy">👨 Boy</label>
                        </div>
                        <div class="gender-option">
                            <input type="radio" id="girl" name="gender" value="Girl" required>
                            <label for="girl">👩 Girl</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="whatsapp">WhatsApp Number</label>
                    <input type="text" id="whatsapp" required placeholder="10 digits या +91 के साथ"
                        pattern="(\+91)?[0-9]{10}">
                </div>

                <button type="submit" id="nextBtn">Next →</button>
            </form>
        </div>

        <!-- Page 2: Password -->
        <div id="page2" class="page">
            <h1>🔐 Password Entry</h1>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="password">Password दर्ज करें</label>
                    <input type="password" id="password" required placeholder="Password">
                </div>

                <button type="submit" id="verifyBtn">Verify Password</button>

                <div class="password-help">
                    <p style="margin-bottom: 10px; color: #666; font-weight: 600;">⚠️ Password नहीं है या Wrong बता रहा
                        है?</p>
                    <p style="margin-bottom: 15px; color: #333; font-size: 15px;">तो नीचे 👇 <strong>Green
                            Button</strong> पर Click करें</p>
                    <a href="#" class="whatsapp-btn" id="getPasswordBtn">
                        Click Here to Get Password
                    </a>
                </div>

                <div id="error" class="error" style="display: none;"></div>
            </form>
        </div>

        <!-- Page 3: Dashboard -->
        <div id="page3" class="page">
            <div class="profile-header">
                <div class="profile-info">
                    <div>
                        <h2 id="userName">Welcome!</h2>
                        <p id="userGender"></p>
                    </div>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
            </div>

            <h1>📖 Study Material</h1>

            <div class="categories">
                <div class="category-btn active" data-category="books">
                    📚 UPSC PYQs Eng Book (Click Here)
                </div>
            </div>

            <div id="pdfList" class="pdf-list">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <!-- PDF Viewer -->
    <div id="pdfViewer" class="pdf-viewer">
        <div class="pdf-controls">
            <h3 style="color: white; margin: 0;" id="pdfTitle">Document</h3>
            <button class="close-btn" id="closePdfBtn">✕ Close</button>
        </div>
        <iframe id="pdfFrame" class="pdf-frame"></iframe>
    </div>

   <script src="https://AllExamsLiveQuiz.github.io/Notes_js/UPSCPYQs.js"></script>
</body>

</html>
